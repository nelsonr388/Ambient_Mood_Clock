<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ambient Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Mono', monospace;
      background: #08090d;
      color: #e8e4f0;
      cursor: none;
    }

    /* ── ORBS ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: background 5s ease;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      will-change: transform;
    }
    #orb1 { width: 60vw; height: 60vw; top: -18vw; left: -12vw; }
    #orb2 { width: 50vw; height: 50vw; bottom: -14vw; right: -10vw; }
    #orb3 { width: 28vw; height: 28vw; top: 50%; left: 55%; opacity: 0.12; }

    /* ── NOISE ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── CUSTOM CURSOR ── */
    #cur  { position: fixed; width: 7px; height: 7px; border-radius: 50%; pointer-events: none; z-index: 1000; transform: translate(-50%,-50%); transition: background 4s ease; mix-blend-mode: screen; }
    #cur2 { position: fixed; width: 30px; height: 30px; border-radius: 50%; border: 1px solid rgba(167,139,250,0.4); pointer-events: none; z-index: 999; transform: translate(-50%,-50%); transition: border-color 4s ease; }

    /* ── ARC SVG ── */
    #arc-svg { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; overflow: visible; }

    /* ── CORNERS ── */
    .corner {
      position: fixed;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: rgba(232,228,240,0.18);
      text-transform: uppercase;
      z-index: 20;
      animation: fadeIn 2s 1.4s both;
    }
    #ctl { top: 28px; left: 36px; }
    #ctr { top: 28px; right: 36px; }
    #cbl { bottom: 28px; left: 36px; }
    #cbr { bottom: 28px; right: 36px; }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      gap: 0;
    }

    #time {
      font-family: 'Playfair Display', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(80px, 17vw, 190px);
      line-height: 0.88;
      letter-spacing: -0.03em;
      color: #e8e4f0;
      transition: text-shadow 5s ease;
      animation: fadeIn 1.2s ease both;
      user-select: none;
    }

    #ampm {
      font-size: clamp(11px, 1.6vw, 16px);
      letter-spacing: 0.45em;
      color: rgba(232,228,240,0.35);
      text-transform: uppercase;
      margin-top: 10px;
      animation: fadeIn 1.2s 0.25s both;
    }

    #date {
      font-size: clamp(10px, 1.3vw, 13px);
      letter-spacing: 0.3em;
      color: rgba(232,228,240,0.3);
      text-transform: uppercase;
      margin-top: 30px;
      animation: fadeIn 1.2s 0.5s both;
    }

    #mood {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(13px, 1.6vw, 17px);
      color: rgba(232,228,240,0.3);
      letter-spacing: 0.06em;
      transition: color 5s ease;
      animation: fadeIn 1.5s 1s both;
      white-space: nowrap;
      z-index: 20;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="cur"></div>
  <div id="cur2"></div>

  <div id="bg">
    <div class="orb" id="orb1"></div>
    <div class="orb" id="orb2"></div>
    <div class="orb" id="orb3"></div>
  </div>

  <svg id="arc-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
    <defs>
      <linearGradient id="ag" gradientUnits="userSpaceOnUse" x1="50" y1="4" x2="96" y2="50">
        <stop offset="0%" stop-color="rgba(167,139,250,0)" />
        <stop offset="100%" stop-color="rgba(167,139,250,0.75)" id="agEnd"/>
      </linearGradient>
    </defs>
    <path id="arc" fill="none" stroke="url(#ag)" stroke-width="0.3" stroke-linecap="round"/>
  </svg>

  <div class="corner" id="ctl">Ambient Clock</div>
  <div class="corner" id="ctr"></div>
  <div class="corner" id="cbl"></div>
  <div class="corner" id="cbr"></div>

  <main>
    <div id="time">12:00</div>
    <div id="ampm">AM</div>
    <div id="date">Saturday, January 1</div>
  </main>

  <div id="mood">the quiet hours</div>

<script>
  const MOODS = [
    { mood:'the witching hour',      bg:'#0d0820', c1:'#1a0a2e', c2:'#2d1b69', acc:'#7c3aed' },
    { mood:'deep in the dark',       bg:'#08090e', c1:'#0d0d18', c2:'#1a1040', acc:'#6d28d9' },
    { mood:'world is asleep',        bg:'#060c12', c1:'#080d14', c2:'#0f1a2e', acc:'#1d4ed8' },
    { mood:'before the dawn',        bg:'#06090f', c1:'#060d12', c2:'#0c1a28', acc:'#1e40af' },
    { mood:'stillness before light', bg:'#08101a', c1:'#0a0e18', c2:'#12203a', acc:'#2563eb' },
    { mood:'first light stirs',      bg:'#0c1420', c1:'#0f1520', c2:'#1e2d4a', acc:'#3b82f6' },
    { mood:'golden hour rising',     bg:'#160e06', c1:'#1a1408', c2:'#3d2c10', acc:'#d97706' },
    { mood:'morning opens up',       bg:'#140e06', c1:'#16120a', c2:'#2e2410', acc:'#f59e0b' },
    { mood:'the day begins',         bg:'#0e0e16', c1:'#121018', c2:'#1e1c30', acc:'#8b5cf6' },
    { mood:'full momentum',          bg:'#0c0e16', c1:'#0e1018', c2:'#1a1c2e', acc:'#6366f1' },
    { mood:'the grind is real',      bg:'#0c0e14', c1:'#0c0e16', c2:'#181a2c', acc:'#4f46e5' },
    { mood:'almost midday',          bg:'#0c0e16', c1:'#0d0f18', c2:'#1a1c30', acc:'#7c3aed' },
    { mood:'sun at its peak',        bg:'#100c06', c1:'#100e08', c2:'#28220c', acc:'#ca8a04' },
    { mood:'afternoon warmth',       bg:'#120a06', c1:'#130e08', c2:'#2a1e0c', acc:'#b45309' },
    { mood:'slow afternoon',         bg:'#100c08', c1:'#12100a', c2:'#261e10', acc:'#92400e' },
    { mood:'golden light returns',   bg:'#120e08', c1:'#14100a', c2:'#2c1e10', acc:'#d97706' },
    { mood:'late afternoon glow',    bg:'#160a06', c1:'#180e08', c2:'#341a0c', acc:'#ea580c' },
    { mood:'the golden hour',        bg:'#180c04', c1:'#1a0e06', c2:'#381a08', acc:'#f97316' },
    { mood:'day winds down',         bg:'#140608', c1:'#16080e', c2:'#2e1018', acc:'#e11d48' },
    { mood:'dusk settles in',        bg:'#100810', c1:'#120a14', c2:'#261428', acc:'#c026d3' },
    { mood:'evening unfolds',        bg:'#0c0a14', c1:'#0e0a16', c2:'#1e1430', acc:'#9333ea' },
    { mood:'night is here',          bg:'#0a0812', c1:'#0c0a16', c2:'#18122e', acc:'#7c3aed' },
    { mood:'the late hours',         bg:'#080810', c1:'#0a0812', c2:'#140e24', acc:'#6d28d9' },
    { mood:'the quiet hours',        bg:'#060608', c1:'#080810', c2:'#100c20', acc:'#5b21b6' },
  ];

  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const timeEl = document.getElementById('time');
  const ampmEl = document.getElementById('ampm');
  const dateEl = document.getElementById('date');
  const moodEl = document.getElementById('mood');
  const bg     = document.getElementById('bg');
  const orb1   = document.getElementById('orb1');
  const orb2   = document.getElementById('orb2');
  const orb3   = document.getElementById('orb3');
  const arcEl  = document.getElementById('arc');
  const agEnd  = document.getElementById('agEnd');
  const cur    = document.getElementById('cur');
  const cur2   = document.getElementById('cur2');
  const ctr    = document.getElementById('ctr');
  const cbr    = document.getElementById('cbr');

  let lastHour = -1;

  function applyTheme(h) {
    const m = MOODS[h];
    bg.style.background = `linear-gradient(135deg, ${m.c1} 0%, ${m.c2} 100%)`;
    orb1.style.background = m.acc;
    orb2.style.background = m.c2;
    orb3.style.background = m.acc;
    moodEl.textContent = m.mood;
    timeEl.style.textShadow = `0 0 100px ${m.acc}44`;
    cur.style.background = m.acc;
    cur2.style.borderColor = m.acc + '55';
    agEnd.setAttribute('stop-color', m.acc + 'cc');
  }

  function updateArc(sec, ms) {
    const progress = (sec + ms / 1000) / 60;
    if (progress < 0.001) { arcEl.setAttribute('d', ''); return; }
    const cx = 50, cy = 50;
    const W = window.innerWidth, H = window.innerHeight;
    const base = Math.min(W, H);
    const rx = (W / base) * 47;
    const ry = (H / base) * 47;
    const sa = -Math.PI / 2;
    const ea = sa + progress * 2 * Math.PI;
    const x1 = cx + rx * Math.cos(sa);
    const y1 = cy + ry * Math.sin(sa);
    const x2 = cx + rx * Math.cos(ea);
    const y2 = cy + ry * Math.sin(ea);
    const lg = progress > 0.5 ? 1 : 0;
    arcEl.setAttribute('d', `M${x1} ${y1} A${rx} ${ry} 0 ${lg} 1 ${x2} ${y2}`);
  }

  function tick() {
    const now  = new Date();
    const h    = now.getHours();
    const m    = now.getMinutes();
    const s    = now.getSeconds();
    const ms   = now.getMilliseconds();
    const h12  = h % 12 || 12;
    const ap   = h < 12 ? 'AM' : 'PM';

    timeEl.textContent = `${h12}:${String(m).padStart(2,'0')}`;
    ampmEl.textContent = ap;
    dateEl.textContent = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
    ctr.textContent    = `${String(s).padStart(2,'0')}s`;
    cbr.textContent    = now.getFullYear();

    if (h !== lastHour) { applyTheme(h); lastHour = h; }

    updateArc(s, ms);

    // Float orbs
    const t = Date.now() / 1000;
    orb1.style.transform = `translate(${Math.sin(t*0.28)*20}px,${Math.cos(t*0.22)*16}px)`;
    orb2.style.transform = `translate(${Math.cos(t*0.19)*16}px,${Math.sin(t*0.31)*20}px)`;
    orb3.style.transform = `translate(${Math.sin(t*0.15)*10}px,${Math.cos(t*0.18)*10}px)`;

    requestAnimationFrame(tick);
  }

  // Cursor
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let rx = mx, ry = my;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function moveCur() {
    rx += (mx - rx) * 0.13;
    ry += (my - ry) * 0.13;
    cur.style.left  = mx + 'px';  cur.style.top  = my + 'px';
    cur2.style.left = rx + 'px';  cur2.style.top = ry + 'px';
    requestAnimationFrame(moveCur);
  })();

  applyTheme(new Date().getHours());
  tick();
</script>
</body>
</html>
